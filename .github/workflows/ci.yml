name: CI

on:
  push:
    branches: [bcr-5.3.0]
  pull_request:
    branches: [bcr-5.3.0]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }}, Bazel ${{ matrix.bazel_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
        bazel_version: ["7.x", "8.x", "9.x"]
        include:
          - bazel_version: "8.x"
            bazel_config: "--config=bazel8"
          - bazel_version: "9.x"
            bazel_config: "--config=bazel9"
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Build
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel build //... ${{ matrix.bazel_config }}
      - name: Test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel test //... ${{ matrix.bazel_config }}

  prof-libunwind:
    name: Prof libunwind (${{ matrix.os }}, Bazel ${{ matrix.bazel_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        bazel_version: ["7.x", "8.x", "9.x"]
        include:
          - bazel_version: "8.x"
            bazel_config: "--config=bazel8"
          - bazel_version: "9.x"
            bazel_config: "--config=bazel9"
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Build
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel build //... --config=prof-libunwind ${{ matrix.bazel_config }}
      - name: Test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel test //... --config=prof-libunwind ${{ matrix.bazel_config }}

  prof-libgcc:
    name: Prof libgcc (${{ matrix.os }}, Bazel ${{ matrix.bazel_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        bazel_version: ["7.x", "8.x", "9.x"]
        include:
          - bazel_version: "8.x"
            bazel_config: "--config=bazel8"
          - bazel_version: "9.x"
            bazel_config: "--config=bazel9"
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Build
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel build //... --config=prof-libgcc ${{ matrix.bazel_config }}
      - name: Test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel test //... --config=prof-libgcc ${{ matrix.bazel_config }}

  prof-gcc:
    name: Prof gcc (${{ matrix.os }}, Bazel ${{ matrix.bazel_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        bazel_version: ["7.x", "8.x", "9.x"]
        include:
          - bazel_version: "8.x"
            bazel_config: "--config=bazel8"
          - bazel_version: "9.x"
            bazel_config: "--config=bazel9"
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Build
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel build //... --config=prof-gcc ${{ matrix.bazel_config }}
      - name: Test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        run: bazel test //... --config=prof-gcc ${{ matrix.bazel_config }}

  examples:
    name: Examples (${{ matrix.os }}, Bazel ${{ matrix.bazel_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
        bazel_version: ["7.x", "8.x", "9.x"]
        include:
          - bazel_version: "8.x"
            bazel_config: "--config=bazel8"
          - bazel_version: "9.x"
            bazel_config: "--config=bazel9"
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Build
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        working-directory: examples
        run: bazel build //... ${{ matrix.bazel_config }}
      - name: Test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        working-directory: examples
        run: bazel test //... ${{ matrix.bazel_config }}
